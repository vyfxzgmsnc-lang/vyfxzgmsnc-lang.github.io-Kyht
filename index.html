<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: system-ui, -apple-system, sans-serif;
}

/* 全屏流动渐变动态背景 */
body {
min-height: 100vh;
padding: 40px 20px;
background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #00416A);
background-size: 400% 400%;
animation: gradientFlow 12s ease infinite;
display: flex;
justify-content: center;
align-items: center;
}

/* 背景流动动画 */
@keyframes gradientFlow {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

/* 磨砂玻璃发光卡片 */
.card {
max-width: 880px;
width: 100%;
padding: 70px 40px;
text-align: center;
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border-radius: 28px;
border: 1px solid rgba(255, 255, 255, 0.12);
box-shadow: 0 0 40px rgba(0, 180, 255, 0.15);
transition: all 0.4s ease;
animation: fadeIn 1s ease;
}

/* 卡片悬浮上浮+强光效果 */
.card:hover {
transform: translateY(-6px);
box-shadow: 0 0 60px rgba(0, 200, 255, 0.25);
}

/* 页面加载淡入动画 */
@keyframes fadeIn {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

/* 发光大标题，解决手机竖屏文字旋转问题 */
h1 {
font-size: 48px;
color: #ffffff;
margin-bottom: 30px;
letter-spacing: 3px;
text-shadow: 0 0 15px rgba(0, 220, 255, 0.4);
word-wrap: break-word;
}

/* 介绍文本样式 */
.desc-text {
font-size: 20px;
color: #e6edf7;
line-height: 1.8;
margin-bottom: 50px;
opacity: 0.9;
}

.btn-group {
margin-bottom: 30px;
display: flex;
gap: 24px;
justify-content: center;
flex-wrap: wrap;
}

/* 渐变发光按钮 */
a.button {
display: inline-block;
text-decoration: none;
font-size: 22px;
padding: 20px 52px;
border-radius: 999px;
color: #fff;
font-weight: 500;
background: linear-gradient(90deg, #00c6ff, #0072ff);
box-shadow: 0 0 20px rgba(0, 170, 255, 0.35);
transition: all 0.3s ease;
min-width: 180px;
}

/* 鼠标悬浮放大、强光 */
a.button:hover {
opacity: 1;
transform: scale(1.07);
box-shadow: 0 0 35px rgba(0, 190, 255, 0.6);
}

/* 点击回弹缩小 */
a.button:active {
transform: scale(0.96);
}

/* 页脚文字 */
.footer-text {
margin-top: 60px;
font-size: 18px;
color: rgba(255,255,255,0.55);
letter-spacing: 1px;
}
</style>
